<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Meet Watchdog — Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      max-width: 480px;
      margin: 40px auto;
      padding: 0 24px;
      color: #202124;
    }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 24px; }
    .field { margin-bottom: 20px; }
    label { display: block; font-weight: 500; margin-bottom: 4px; }
    .hint { font-size: 12px; color: #5f6368; margin-top: 4px; }
    input[type="number"] {
      width: 80px;
      padding: 6px 10px;
      border: 1px solid #dadce0;
      border-radius: 6px;
      font-size: 14px;
    }
    .save-row { display: flex; align-items: center; gap: 12px; margin-top: 24px; }
    button {
      padding: 8px 20px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    button:hover { opacity: 0.9; }
    #saved { color: #34a853; font-size: 13px; display: none; }
  </style>
</head>
<body>
  <h1>Meet Watchdog Settings</h1>

  <div class="field">
    <label for="alertBefore">Alert before start (minutes)</label>
    <input type="number" id="alertBefore" min="0" max="30" value="0">
    <p class="hint">0 = alert at start time. Set to 2 to get a 2-minute warning.</p>
  </div>

  <div class="field">
    <label for="gracePeriod">Grace period (minutes)</label>
    <input type="number" id="gracePeriod" min="1" max="60" value="15">
    <p class="hint">Stop alerting this many minutes after the meeting start time.</p>
  </div>

  <div class="field">
    <label for="maxAlerts">Max alerts per meeting</label>
    <input type="number" id="maxAlerts" min="1" max="10" value="3">
    <p class="hint">Give up after this many attempts if you haven't joined.</p>
  </div>

  <div class="save-row">
    <button id="save">Save</button>
    <span id="saved">Saved!</span>
  </div>

  <script src="options.js"></script>
</body>
</html>
