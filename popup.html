<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      width: 240px;
      background: #fff;
      color: #202124;
    }
    header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px 10px;
      border-bottom: 1px solid #e8eaed;
    }
    header img { width: 20px; height: 20px; }
    header h1 { font-size: 14px; font-weight: 600; }
    .body { padding: 12px 16px; }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.green  { background: #34a853; }
    .dot.red    { background: #ea4335; }
    .dot.yellow { background: #fbbc04; }
    .status-text { color: #5f6368; line-height: 1.4; }
    button {
      width: 100%;
      padding: 8px 0;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 6px;
    }
    .btn-primary   { background: #1a73e8; color: #fff; }
    .btn-secondary { background: #f1f3f4; color: #202124; }
    .btn-danger    { background: #fce8e6; color: #c5221f; }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: default; }
    .divider { border: none; border-top: 1px solid #e8eaed; margin: 8px 0; }
    .small { font-size: 11px; color: #80868b; text-align: center; }
    a { color: #1a73e8; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <img src="icons/icon48.png" alt="">
    <h1>Meet Watchdog</h1>
  </header>

  <div class="body">
    <div class="status">
      <div class="dot" id="dot"></div>
      <div class="status-text" id="status-text">Checking…</div>
    </div>

    <button class="btn-primary"   id="btn-connect"    style="display:none">Connect Google Calendar</button>
    <button class="btn-secondary" id="btn-check"      style="display:none">Check now</button>
    <button class="btn-danger"    id="btn-disconnect" style="display:none">Disconnect</button>

    <hr class="divider">
    <p class="small"><a href="#" id="options-link">Settings</a> &nbsp;·&nbsp; <a href="#" id="reset-link">Reset meeting state</a></p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
